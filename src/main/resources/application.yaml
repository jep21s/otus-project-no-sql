spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:a1}
  jackson:
    serialization:
      write-durations-as-timestamps: false
  servlet:
    multipart:
      enabled: false

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.example.orderservice: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
