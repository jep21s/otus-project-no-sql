# B1: PostgreSQL master + replica + Redis (master + replica + sentinel)
spring:
  datasource:
    url: jdbc:postgresql://pg-master:5432,pg-replica:5432/orders?targetServerType=primary&loadBalanceHosts=true
    username: orders
    password: orders
    hikari:
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
        default_batch_fetch_size: 50
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
  data:
    redis:
      sentinel:
        master: mymaster
        nodes: redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      password: ""
      lettuce:
        pool:
          max-active: 16
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.couchbase.CouchbaseAutoConfiguration
      - org.springframework.boot.autoconfigure.data.couchbase.CouchbaseDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.couchbase.CouchbaseRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.couchbase.CouchbaseReactiveDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.couchbase.CouchbaseReactiveRepositoriesAutoConfiguration
