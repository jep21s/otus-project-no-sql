name: orders-c1

x-pg-common: &pg-common
  image: postgres:16-alpine
  environment: &pg-env
    POSTGRES_DB: orders
    POSTGRES_USER: orders
    POSTGRES_PASSWORD: orders
    POSTGRES_HOST_AUTH_METHOD: trust
    PGDATA: /var/lib/postgresql/data

services:
  pg-master:
    <<: *pg-common
    hostname: pg-master
    command: ["postgres", "-c", "wal_level=replica", "-c", "max_wal_senders=20", "-c", "max_replication_slots=20", "-c", "hot_standby=on"]
    volumes:
      - pgmaster:/var/lib/postgresql/data
      - ./pg/00-replication.sh:/docker-entrypoint-initdb.d/00-replication.sh:ro
      - ./pg/master-init.sql:/docker-entrypoint-initdb.d/10-master-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders -d orders"]
      interval: 5s
      timeout: 3s
      retries: 30

  pg-replica-1:
    <<: *pg-common
    hostname: pg-replica-1
    entrypoint: ["/bin/sh", "/replica/replica-entrypoint.sh"]
    volumes:
      - pgreplica1:/var/lib/postgresql/data
      - ./pg/replica-entrypoint.sh:/replica/replica-entrypoint.sh:ro
    depends_on:
      pg-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders -d orders && psql -U orders -d orders -tAc \"select pg_is_in_recovery()\" | grep -q t"]
      interval: 5s
      timeout: 3s
      retries: 30

  pg-replica-2:
    <<: *pg-common
    hostname: pg-replica-2
    entrypoint: ["/bin/sh", "/replica/replica-entrypoint.sh"]
    volumes:
      - pgreplica2:/var/lib/postgresql/data
      - ./pg/replica-entrypoint.sh:/replica/replica-entrypoint.sh:ro
    depends_on:
      pg-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders -d orders && psql -U orders -d orders -tAc \"select pg_is_in_recovery()\" | grep -q t"]
      interval: 5s
      timeout: 3s
      retries: 30

  # Redis Cluster: 6 нод (3 master + 3 replica)
  redis-node-1:
    image: redis:7-alpine
    hostname: redis-node-1
    command: ["redis-server", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--save", "", "--appendonly", "no"]
  redis-node-2:
    image: redis:7-alpine
    hostname: redis-node-2
    command: ["redis-server", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--save", "", "--appendonly", "no"]
  redis-node-3:
    image: redis:7-alpine
    hostname: redis-node-3
    command: ["redis-server", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--save", "", "--appendonly", "no"]
  redis-node-4:
    image: redis:7-alpine
    hostname: redis-node-4
    command: ["redis-server", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--save", "", "--appendonly", "no"]
  redis-node-5:
    image: redis:7-alpine
    hostname: redis-node-5
    command: ["redis-server", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--save", "", "--appendonly", "no"]
  redis-node-6:
    image: redis:7-alpine
    hostname: redis-node-6
    command: ["redis-server", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--save", "", "--appendonly", "no"]

  redis-cluster-init:
    image: redis:7-alpine
    depends_on: ["redis-node-1", "redis-node-2", "redis-node-3", "redis-node-4", "redis-node-5", "redis-node-6"]
    entrypoint: ["/bin/sh", "/redis/cluster-init.sh"]
    volumes: ["./redis/cluster-init.sh:/redis/cluster-init.sh:ro"]

  nginx:
    image: nginx:1.27-alpine
    volumes: ["./nginx.conf:/etc/nginx/nginx.conf:ro"]
    ports: ["8080:8080"]
    depends_on: ["app-1", "app-2"]

  app-1:
    image: order-service:latest
    hostname: app-1
    environment:
      SPRING_PROFILES_ACTIVE: c1
      JAVA_OPTS: "-XX:MaxRAMPercentage=60 -XX:+UseG1GC"
    depends_on:
      pg-master: { condition: service_healthy }
      redis-cluster-init: { condition: service_completed_successfully }

  app-2:
    image: order-service:latest
    hostname: app-2
    environment:
      SPRING_PROFILES_ACTIVE: c1
      JAVA_OPTS: "-XX:MaxRAMPercentage=60 -XX:+UseG1GC"
    depends_on:
      pg-master: { condition: service_healthy }
      redis-cluster-init: { condition: service_completed_successfully }

volumes:
  pgmaster:
  pgreplica1:
  pgreplica2:
