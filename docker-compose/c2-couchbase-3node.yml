name: orders-c2

# Couchbase 3-node cluster (secure-join TLS) + 2 инстанса приложения за nginx.
services:
  couchbase-node-1:
    image: couchbase/server:7.6.0
    hostname: node-1.cb.internal
    entrypoint: ["/wrapper/cb-node-entrypoint.sh"]
    volumes:
      - ./couchbase/certs:/staged:ro
      - ./couchbase/cb-node-entrypoint.sh:/wrapper/cb-node-entrypoint.sh:ro
    networks:
      default:
        ipv4_address: 172.28.0.11
        aliases: [node-1.cb.internal]

  couchbase-node-2:
    image: couchbase/server:7.6.0
    hostname: node-2.cb.internal
    entrypoint: ["/wrapper/cb-node-entrypoint.sh"]
    volumes:
      - ./couchbase/certs:/staged:ro
      - ./couchbase/cb-node-entrypoint.sh:/wrapper/cb-node-entrypoint.sh:ro
    networks:
      default:
        ipv4_address: 172.28.0.12
        aliases: [node-2.cb.internal]

  couchbase-node-3:
    image: couchbase/server:7.6.0
    hostname: node-3.cb.internal
    entrypoint: ["/wrapper/cb-node-entrypoint.sh"]
    volumes:
      - ./couchbase/certs:/staged:ro
      - ./couchbase/cb-node-entrypoint.sh:/wrapper/cb-node-entrypoint.sh:ro
    networks:
      default:
        ipv4_address: 172.28.0.13
        aliases: [node-3.cb.internal]

  couchbase-init:
    image: couchbase/server:7.6.0
    depends_on: [couchbase-node-1, couchbase-node-2, couchbase-node-3]
    entrypoint: ["/bin/bash", "/setup/couchbase-setup.sh"]
    environment:
      CB_NODES: node-1.cb.internal,node-2.cb.internal,node-3.cb.internal
      CB_BUCKET: orders
      CB_USER: Administrator
      CB_PASS: password
      CB_RAMSIZE: "1024"
    volumes:
      - ./couchbase-setup.sh:/setup/couchbase-setup.sh:ro
    networks: [default]

  nginx:
    image: nginx:1.27-alpine
    volumes: ["./nginx.conf:/etc/nginx/nginx.conf:ro"]
    ports: ["8080:8080"]
    depends_on: [app-1, app-2]
    networks: [default]

  app-1:
    image: order-service:latest
    hostname: app-1
    environment:
      SPRING_PROFILES_ACTIVE: c2
      JAVA_OPTS: "-XX:MaxRAMPercentage=60 -XX:+UseG1GC"
    depends_on:
      couchbase-init:
        condition: service_completed_successfully
    networks: [default]

  app-2:
    image: order-service:latest
    hostname: app-2
    environment:
      SPRING_PROFILES_ACTIVE: c2
      JAVA_OPTS: "-XX:MaxRAMPercentage=60 -XX:+UseG1GC"
    depends_on:
      couchbase-init:
        condition: service_completed_successfully
    networks: [default]

networks:
  default:
    name: orders-c2-net
    ipam:
      config:
        - subnet: 172.28.0.0/16
